<svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Papier oben (Einzug) -->
  <rect x="38" y="10" width="52" height="34" rx="4"
        fill="#ffffff" stroke="#c0bfbc" stroke-width="2"/>
  <!-- Drucker-Gehäuse -->
  <rect x="18" y="36" width="92" height="50" rx="10"
        fill="#3584e4"/>
  <!-- Glanzeffekt oben -->
  <rect x="18" y="36" width="92" height="18" rx="10"
        fill="#4a90d9" opacity="0.5"/>
  <!-- Einzugsschlitz -->
  <rect x="30" y="50" width="68" height="7" rx="3.5"
        fill="#1c71d8"/>
  <!-- Ausgabe-Papier -->
  <rect x="38" y="74" width="52" height="42" rx="4"
        fill="#ffffff" stroke="#c0bfbc" stroke-width="2"/>
  <!-- Linien auf Ausgabepapier -->
  <line x1="46" y1="86" x2="82" y2="86"
        stroke="#deddda" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="46" y1="94" x2="76" y2="94"
        stroke="#deddda" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="46" y1="102" x2="70" y2="102"
        stroke="#deddda" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Status-LED (grün = bereit) -->
  <circle cx="90" cy="54" r="5" fill="#57e389"/>
  <circle cx="90" cy="54" r="2.5" fill="#40d878"/>
</svg>
